#使用root用户启动master时的worker进程用户，使用其他用户启动可不配置
#user  nginx;

#worker进程数，auto为操作系统CPU核心数
worker_processes  auto;

# 显示声明句柄数，按需调整，建议为worker_connections的3倍
worker_rlimit_nofile 190650;

# 全局错误日志路径
# 默认为error级别，从低到高为：debug, info, notice, warn, error, crit, alert, or emerg
error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

# 显示声明pid路径（默认为logs/nginx.pid）
pid        logs/nginx.pid;

events {
    # 每个worker进程能处理的连接数上限，按需调整
    worker_connections  65535;
}

# =====================================================
# 7层 HTTP 模块
# =====================================================
http {
    include       mime.types;
    default_type  application/octet-stream;

    # [HTTP 日志格式详解，按需调整]
    # $remote_addr            : 客户端 IP
    # $remote_user            : 认证用户名
    # $time_local             : 访问时间
    # $request                : 请求行 (GET /api/v1... HTTP/1.1)
    # $status                 : HTTP 状态码
    # $body_bytes_sent        : 响应体大小
    # $http_referer           : 来源页面
    # $http_user_agent        : 客户端标识
    # $http_x_forwarded_for   : 真实 IP 透传链，强烈建议保留
    # rt=$request_time        : 全链路总耗时 (用户等待时间 = 网络 + Nginx + 后端)
    # uct=$upstream_connect_time    : TCP 握手耗时 (长连接时应≈0)
    # uht=$upstream_header_time     : 后端业务处理耗时 (首字节头返回)
    # urt=$upstream_response_time   : 后端全量响应耗时 (含 Body 传输)
    # uad="$upstream_addr"          : 实际处理请求的后端服务器

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time" '
                      'uad="$upstream_addr"';

    access_log  logs/access.log  main;

    # 零拷贝, 开启 Linux 的 sendfile() 系统调用，降低发送静态文件时的 CPU 消耗
    sendfile        on;

    # 带宽优化, 强制 Nginx 等待数据包填满（MSS）后再发送，防止发送碎片包，提高带宽利用率，减少网络拥塞（适合大文件传输）开启sendfile生效，默认off，按需开启
    # tcp_nopush      on;

    # 延迟优化, 禁用Nagle 算法，默认 TCP 会等一小会儿凑数据。开启后，只要有数据就立刻发出去，降低 API 接口、交互式应用的延迟，默认on
    tcp_nodelay     on;

    # 客户端和Nginx保持长连接的时间，默认75s
    keepalive_timeout  65;

    # 客户端request body的最大值，默认1m，按需调整，客户端请求过大会返回413 (Request Entity Too Large)
    client_max_body_size 30m;
    
    #显示nginx版本，行内规范强制off
    server_tokens off;
    
    # 压缩相关配置
    # 开启压缩，默认off，按需开启，减小带宽占用，需开启后才涉及下方其他压缩相关配置
    # gzip on;
    # gzip_min_length 500; #最小压缩阈值，默认20（字节），按需调整
    # gzip_buffers 4 16k; #Nginx 向系统申请压缩内存的“块”数量和大小。在高并发下，指定较大的 buffer能减少系统调用次数，提升大文件压缩性能，按需调整
    # gzip_http_version 1.1;  #压缩响应的最小版本，默认1.1，一般不用调整
    # gzip_comp_level 1; #压缩等级，默认为1，越大压缩率越高CPU开销越大，一般不建议超过5，压测后谨慎调整
    # 待压缩的 MIME 类型 ，默认只有 text/html，是内置强制压缩的，不需要写在这里，写了会报 warn；按需增加需要压缩的类型
    # gzip_types
    #    text/plain
    #    text/css
    #    text/javascript
    #    application/javascript
    #    application/x-javascript
    #    application/json
    #    application/xml
    #    application/rss+xml;
    # gzip_vary on; #在响应头添加 Vary: Accept-Encoding。避免 CDN/代理服务器 缓存错误的版本。默认off,按需开启
    # gzip_proxied expired no-cache no-store private auth; #代理压缩策略，默认off，不压缩后端返回数据，设置不同的值让Nginx对这部分后端返回数据进行压缩，任意均压缩设置为any，按需配置，各项详细含义请参考官方文档
    # gzip_disable "MSIE [1-6]\."; #设置哪些User-Agent头不开启压缩，默认均开启压缩，按示例配置可兼容IE6
    

    # 更多自定义配置可放在此
    # 详细server配置放在http.d下生效即可，里面包含监控配置，勿删
    include http.d/*.conf;
}

# =====================================================
# 4层 Stream (TCP/UDP) 模块，如不需要使用四层模块可注释后面部分
# =====================================================
stream {
    # [Stream 日志格式详解，按需调整]
    # $remote_addr            : 客户端 IP
    # $time_local             : 连接结束时间
    # $protocol               : 协议 (TCP/UDP)
    # $status                 : 状态 (200=OK, 500=Error, 403=Deny)
    # $bytes_sent             : 发回给客户端的字节数
    # $bytes_received         : 从客户端接收的字节数
    # $session_time           : 连接总持续时长 (秒) -> 对应 HTTP 的 request_time
    # $upstream_addr          : 后端 IP:Port
    # $upstream_connect_time  : 连接后端握手耗时 (高则代表后端负载高/拒绝服务)
    log_format tcp_format '$remote_addr [$time_local] '
                          '$protocol $status $bytes_sent $bytes_received '
                          '$session_time "$upstream_addr" '
                          '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';

    # [Stream 访问日志]
    # buffer=32k: 开启缓冲减少IO; flush=5s: 最多攒5秒
    # 注意: TCP 日志仅在连接断开(Session Close)时写入
    access_log logs/stream_access.log tcp_format buffer=32k flush=5s;

    # 更多自定义配置可放在此
    # 详细server配置放在http.d下生效即可
    include stream.d/*.conf;
}
