# =========================================================
# VTS HTTP Monitor Activation
# Path: conf/http.d/monitor_19913.conf
# 删除此文件将失去Nginx监控
# =========================================================

# 1. [核心] 全局共享内存分配 (32MB)
vhost_traffic_status_zone shared:vhost_traffic_status:32m;

# 2. [通用维度] 开启 Host 和 Method 细分
vhost_traffic_status_filter_by_host on;
vhost_traffic_status_filter_by_set_key $request_method;

# 3. [精度] P99 耗时统计桶 (秒)
vhost_traffic_status_histogram_buckets 0.005 0.01 0.05 0.1 0.5 1 3 10;

# 4. [监控服务] 独立端口 19913
server {
    listen 19913;
    server_name localhost;

    location /nginx_status {
        vhost_traffic_status_display;
        vhost_traffic_status_display_format prometheus;
    # 跳过监控统计
    vhost_traffic_status_filter off;
        access_log off;
    }
}
